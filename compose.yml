# compose.yml — Stack de desarrollo: Airflow + PostgreSQL + Datasette
# Compatible con: podman-compose up -d / docker compose up -d

# ── Variables compartidas entre los servicios Airflow ─────────────────────────
x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY:-dev-secret-key-change-in-prod}
    # Airflow 3.x: secreto compartido para firma JWT entre todos los contenedores.
    # Sin esto, cada contenedor genera su propio secreto aleatorio → Signature verification failed.
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-dev-jwt-secret-change-in-prod}
    # Airflow 3.x: LocalExecutor se comunica con el api-server via httpx.
    # Sin esta URL, el executor intenta localhost:8080 → Connection refused.
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"
    # Airflow 3.x SimpleAuthManager: usuario admin con role Admin
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:Admin
    # Fichero de contraseñas en el bind mount (persiste entre reinicios)
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/data/airflow-passwords.json
    API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
    DATABASE_URL: postgresql+psycopg2://airflow:airflow@postgres:5432/football
  volumes:
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

# ── Servicios ─────────────────────────────────────────────────────────────────
services:

  # 1. PostgreSQL 18 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./sql/init.sql:/opt/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    restart: unless-stopped

  # 2. Inicialización de Airflow (one-shot) ──────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate
        echo '{"admin": "admin"}' > /opt/airflow/data/airflow-passwords.json
    restart: "no"

  # 3. Airflow Webserver (:8080) ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # 4. Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # 5. Airflow DAG Processor ────────────────────────────────────────────────
  # Airflow 3.x separó el procesado de ficheros DAG del scheduler.
  # Sin este servicio, los DAGs nunca se registran en la base de datos.
  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # 6. Datasette (:8001) ─────────────────────────────────────────────────────
  # Nota: el entrypoint de la imagen Airflow (/entrypoint) intercepta todos los
  # comandos como subcomandos de airflow. Se sobreescribe para pasar directo a
  # dumb-init sin el wrapper de Airflow.
  datasette:
    build: .
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - /home/airflow/.local/bin/datasette
      - serve
      - /opt/airflow/data/enriched/enriched.db
      - --host
      - "0.0.0.0"
      - --port
      - "8001"
      - --metadata
      - /opt/airflow/datasette/metadata.yml
      - --create
    ports:
      - "8001:8001"
    volumes:
      - ./data:/opt/airflow/data
      - ./datasette:/opt/airflow/datasette:ro
    restart: unless-stopped

# ── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
