sources:
  api_football:
    league_id: 140        # La Liga
    season: 2024          # Free plan: 2022-2024 only
    endpoints:
      - players_stats     # Per-team pagination: ~40 calls (20 teams × ~2 pages)
      - injuries          # League-level: ~1 call (no pagination)
      - transfers         # Per-team: ~20 calls (1 per team)
    cache_dir: data/cache/api_football
    cache_ttl_hours: 168  # 7 days
    rate_limit:
      max_calls_per_day: 100
      delay_between_calls: 7.0  # seconds — free plan: 10 req/min → ≥6s between calls
    # NOTE: Free tier limits /players pagination to page ≤ 3 per query.
    # The loader uses per-team queries (/players?team={id}) to bypass this.
    # Total estimated calls: 1 (teams) + 40 (players) + 1 (injuries) + 20 (transfers) + 1 (standings) ≈ 63.
  understat:
    league: "ESP-La Liga"   # soccerdata format (was "La Liga")
    season: "2024/2025"     # Aligns with API-Football season 2024
