sources:
  api_football:
    league_id: 140        # La Liga
    season: 2024          # Free plan: 2022-2024 only
    endpoints:
      - players_stats
      - injuries
      - transfers
    cache_dir: data/cache/api_football
    cache_ttl_hours: 168  # 7 days
    rate_limit:
      max_calls_per_day: 100
      delay_between_calls: 7.0  # seconds — free plan: 10 req/min → ≥6s between calls
  understat:
    league: "ESP-La Liga"   # soccerdata format (was "La Liga")
    season: "2024/2025"     # Aligns with API-Football season 2024
